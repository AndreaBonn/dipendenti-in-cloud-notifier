name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

      - name: Run tests with JUnit reporter
        run: npx vitest run --reporter=default --reporter=junit --outputFile.junit=test-results.xml

      - name: Run tests with coverage
        if: always()
        run: npx vitest run --coverage

      - name: Generate test badge
        if: always()
        run: |
          python3 -c "
          import json, xml.etree.ElementTree as ET
          root = ET.parse('test-results.xml').getroot()
          suites = root.findall('testsuite') if root.tag == 'testsuites' else [root]
          tests = sum(int(s.attrib.get('tests', 0)) for s in suites)
          failures = sum(int(s.attrib.get('failures', 0)) for s in suites)
          errors = sum(int(s.attrib.get('errors', 0)) for s in suites)
          passed = tests - failures - errors
          badge = {
              'schemaVersion': 1,
              'label': 'tests',
              'message': f'{passed}/{tests} passed' if failures + errors > 0 else f'{passed} passed',
              'color': 'red' if failures + errors > 0 else 'brightgreen'
          }
          with open('badges/test-badge.json', 'w') as f:
              json.dump(badge, f)
          "

      - name: Generate coverage badge
        if: always()
        run: |
          python3 -c "
          import json, os
          summary_path = 'coverage/coverage-summary.json'
          if not os.path.exists(summary_path):
              badge = {'schemaVersion': 1, 'label': 'coverage', 'message': 'N/A', 'color': 'lightgrey'}
          else:
              with open(summary_path) as f:
                  data = json.load(f)
              pct = data['total']['lines']['pct']
              if pct >= 90:
                  color = 'brightgreen'
              elif pct >= 80:
                  color = 'green'
              elif pct >= 60:
                  color = 'yellow'
              else:
                  color = 'red'
              badge = {'schemaVersion': 1, 'label': 'coverage', 'message': f'{pct}%', 'color': color}
          with open('badges/coverage-badge.json', 'w') as f:
              json.dump(badge, f)
          "

      - name: Commit badges
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/test-badge.json badges/coverage-badge.json
          git diff --cached --quiet || git commit -m "ci: update badges [skip ci]"
          git push

  validate-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest.json
        run: node -e "const m = require('./manifest.json'); if (m.manifest_version !== 3) process.exit(1); console.log('Manifest v' + m.manifest_version + ' OK - ' + m.name + ' v' + m.version)"
